<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Order Confirmation</title>
</head>
<body style="font-family: Arial, sans-serif; background:#f5f5f5; padding:20px;">
    <div style="max-width:600px; margin:0 auto; background:#ffffff; padding:30px; border-radius:10px;">
        <h2 style="color:#198754;">Order Confirmation</h2>
        <p>Hello {{ user.username }},</p>
        <p>Thank you for your order at <strong>EcoSecure Shop</strong>.</p>

        <div style="background:#f8f9fa; padding:15px; border-radius:8px; margin:20px 0;">
            <p><strong>Order ID:</strong> #{{ order.id }}</p>
            <p><strong>Total Amount:</strong> ${{ order.total_amount }}</p>
            <p><strong>Status:</strong> {{ order.status }}</p>
        </div>

        <p>Your order has been placed successfully.</p>
        <p>Thank you,<br>EcoSecure Shop</p>
    </div>
</body>
</html>
