{% extends 'store/base.html' %}

{% block title %}Login - EcoSecure Shop{% endblock %}

{% block content %}

<style>
    .login-wrapper {
        max-width: 480px;
        margin: 2rem auto 3rem;
    }

    .login-card {
        background: rgba(255, 255, 255, 0.82) !important;
        border: 1px solid rgba(200, 188, 170, 0.3) !important;
        border-radius: 20px !important;
        box-shadow: 0 2px 12px rgba(26, 58, 42, 0.10);
        padding: 2.5rem 2.25rem !important;
    }

    .login-card h2 {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 600;
        font-size: 2rem;
        color: var(--eco-forest);
        letter-spacing: 0.01em;
        margin-bottom: 1.75rem;
        text-align: center;
    }

    .login-card .alert-warning {
        background-color: #fdf3e3 !important;
        border: 1px solid rgba(196, 169, 122, 0.35) !important;
        border-left: 3px solid var(--eco-sand) !important;
        border-radius: 8px !important;
        color: var(--eco-bark) !important;
        font-size: 0.875rem;
        font-family: 'DM Sans', sans-serif;
        margin-bottom: 1.25rem;
        padding: 0.75rem 1rem;
    }

    .login-card label {
        display: block;
        font-size: 0.75rem;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--eco-stone);
        font-weight: 400;
        margin-bottom: 0.35rem;
        font-family: 'DM Sans', sans-serif;
    }

    .login-card input[type="text"],
    .login-card input[type="password"] {
        display: block;
        width: 100%;
        background-color: rgba(255, 255, 255, 0.8) !important;
        border: 1px solid rgba(164, 150, 130, 0.35) !important;
        border-radius: 8px !important;
        color: var(--eco-charcoal) !important;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.9rem !important;
        font-weight: 300;
        padding: 0.65rem 0.9rem !important;
        transition: border-color 200ms cubic-bezier(0.4,0,0.2,1),
                    box-shadow 200ms cubic-bezier(0.4,0,0.2,1);
        outline: none;
        box-sizing: border-box;
    }

    .login-card input[type="text"]:focus,
    .login-card input[type="password"]:focus {
        background-color: #fff !important;
        border-color: var(--eco-sage) !important;
        box-shadow: 0 0 0 3px rgba(74, 124, 95, 0.15) !important;
    }

    .btn-login {
        background-color: var(--eco-moss) !important;
        border: none !important;
        border-radius: 999px !important;
        font-size: 0.82rem !important;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        font-weight: 400;
        font-family: 'DM Sans', sans-serif;
        padding: 0.65rem 1.5rem !important;
        color: #fff !important;
        width: 100%;
        margin-top: 0.75rem;
        cursor: pointer;
        transition: background 200ms cubic-bezier(0.4,0,0.2,1),
                    box-shadow 200ms cubic-bezier(0.4,0,0.2,1);
    }

    .btn-login:hover,
    .btn-login:focus {
        background-color: var(--eco-forest) !important;
        box-shadow: 0 4px 14px rgba(26, 58, 42, 0.28) !important;
    }

    .login-footer {
        font-size: 0.875rem;
        color: var(--eco-stone);
        text-align: center;
        margin-top: 1.25rem;
        margin-bottom: 0;
        font-family: 'DM Sans', sans-serif;
        font-weight: 300;
    }

    .login-footer a {
        color: var(--eco-sage);
        text-decoration: none;
        transition: color 200ms cubic-bezier(0.4,0,0.2,1);
    }

    .login-footer a:hover {
        color: var(--eco-forest);
    }
</style>

<div class="login-wrapper">
    <div class="login-card">
        <h2>Login</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="alert-warning">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>

        <p class="login-footer">
            Don't have an account?
            <a href="{% url 'register' %}">Register here</a>
        </p>
    </div>
</div>

{% endblock %}
