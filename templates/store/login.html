{% extends 'store/base.html' %}

{% block title %}Login - EcoSecure Shop{% endblock %}

{% block content %}

<style>
    .login-wrapper {
        max-width: 480px;
        margin: 2rem auto 3rem;
        position: relative;
        animation: fadeUp 0.7s ease;
    }

    .login-wrapper::before,
    .login-wrapper::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        z-index: 0;
        pointer-events: none;
        filter: blur(2px);
    }

    .login-wrapper::before {
        width: 160px;
        height: 160px;
        background: rgba(74, 124, 95, 0.10);
        top: -30px;
        left: -45px;
        animation: floatBlob 7s ease-in-out infinite;
    }

    .login-wrapper::after {
        width: 120px;
        height: 120px;
        background: rgba(196, 169, 122, 0.10);
        bottom: -25px;
        right: -35px;
        animation: floatBlob 8s ease-in-out infinite reverse;
    }

    .login-card {
        position: relative;
        z-index: 1;
        background: rgba(255, 255, 255, 0.82) !important;
        border: 1px solid rgba(200, 188, 170, 0.3) !important;
        border-radius: 24px !important;
        box-shadow: 0 8px 24px rgba(26, 58, 42, 0.10);
        padding: 2.5rem 2.25rem !important;
        backdrop-filter: blur(10px);
        overflow: hidden;
        animation: cardPop 0.55s ease;
    }

    .login-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: linear-gradient(90deg, var(--eco-moss), var(--eco-sage), var(--eco-sand));
        opacity: 0.9;
    }

    .login-card h2 {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 600;
        font-size: 2rem;
        color: var(--eco-forest);
        letter-spacing: 0.01em;
        margin-bottom: 1.75rem;
        text-align: center;
        position: relative;
    }

    .login-card h2::after {
        content: "";
        display: block;
        width: 70px;
        height: 2px;
        margin: 0.6rem auto 0;
        background: linear-gradient(to right, transparent, var(--eco-sage), transparent);
        animation: pulseLine 2.5s ease-in-out infinite;
    }

    .login-card .alert-warning {
        background-color: #fdf3e3 !important;
        border: 1px solid rgba(196, 169, 122, 0.35) !important;
        border-left: 3px solid var(--eco-sand) !important;
        border-radius: 10px !important;
        color: var(--eco-bark) !important;
        font-size: 0.875rem;
        font-family: 'DM Sans', sans-serif;
        margin-bottom: 1.25rem;
        padding: 0.75rem 1rem;
        animation: fadeUp 0.4s ease;
    }

    .login-card label {
        display: block;
        font-size: 0.75rem;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--eco-stone);
        font-weight: 400;
        margin-bottom: 0.35rem;
        font-family: 'DM Sans', sans-serif;
    }

    .login-card input[type="text"],
    .login-card input[type="password"] {
        display: block;
        width: 100%;
        background-color: rgba(255, 255, 255, 0.8) !important;
        border: 1px solid rgba(164, 150, 130, 0.35) !important;
        border-radius: 10px !important;
        color: var(--eco-charcoal) !important;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.9rem !important;
        font-weight: 300;
        padding: 0.75rem 0.95rem !important;
        transition: border-color 200ms cubic-bezier(0.4,0,0.2,1),
                    box-shadow 200ms cubic-bezier(0.4,0,0.2,1),
                    transform 200ms cubic-bezier(0.4,0,0.2,1),
                    background-color 200ms cubic-bezier(0.4,0,0.2,1);
        outline: none;
        box-sizing: border-box;
    }

    .login-card input[type="text"]:focus,
    .login-card input[type="password"]:focus {
        background-color: #fff !important;
        border-color: var(--eco-sage) !important;
        box-shadow: 0 0 0 4px rgba(74, 124, 95, 0.12) !important;
        transform: translateY(-1px);
    }

    .btn-login {
        background: linear-gradient(135deg, var(--eco-moss), var(--eco-forest)) !important;
        border: none !important;
        border-radius: 999px !important;
        font-size: 0.82rem !important;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        font-weight: 500;
        font-family: 'DM Sans', sans-serif;
        padding: 0.75rem 1.5rem !important;
        color: #fff !important;
        width: 100%;
        margin-top: 0.75rem;
        cursor: pointer;
        transition: transform 200ms cubic-bezier(0.4,0,0.2,1),
                    box-shadow 200ms cubic-bezier(0.4,0,0.2,1),
                    filter 200ms cubic-bezier(0.4,0,0.2,1);
        position: relative;
        overflow: hidden;
    }

    .btn-login::before {
        content: "";
        position: absolute;
        top: 0;
        left: -120%;
        width: 120%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
        transition: left 0.6s ease;
    }

    .btn-login:hover::before {
        left: 120%;
    }

    .btn-login:hover,
    .btn-login:focus {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(26, 58, 42, 0.24) !important;
        filter: brightness(1.02);
    }

    .login-footer {
        font-size: 0.875rem;
        color: var(--eco-stone);
        text-align: center;
        margin-top: 1.25rem;
        margin-bottom: 0;
        font-family: 'DM Sans', sans-serif;
        font-weight: 300;
    }

    .login-footer a {
        color: var(--eco-sage);
        text-decoration: none;
        transition: color 200ms cubic-bezier(0.4,0,0.2,1);
    }

    .login-footer a:hover {
        color: var(--eco-forest);
    }

    @keyframes fadeUp {
        from {
            opacity: 0;
            transform: translateY(18px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes cardPop {
        from {
            opacity: 0;
            transform: scale(0.97);
        }
        to {
            opacity: 1;
            transform: scale(1);
        }
    }

    @keyframes floatBlob {
        0%, 100% {
            transform: translateY(0px) translateX(0px);
        }
        50% {
            transform: translateY(-10px) translateX(6px);
        }
    }

    @keyframes pulseLine {
        0%, 100% {
            opacity: 0.55;
            transform: scaleX(0.95);
        }
        50% {
            opacity: 1;
            transform: scaleX(1.05);
        }
    }

    @media (max-width: 576px) {
        .login-wrapper {
            margin: 1rem auto 2rem;
        }

        .login-card {
            padding: 2rem 1.2rem !important;
        }

        .login-card h2 {
            font-size: 1.75rem;
        }
    }
</style>

<div class="login-wrapper">
    <div class="login-card">
        <h2>Login</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="alert-warning">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>

        <p class="login-footer">
            Don't have an account?
            <a href="{% url 'register' %}">Register here</a>
        </p>
    </div>
</div>

{% endblock %}
